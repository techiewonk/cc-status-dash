name: ci

# Typecheck + tests on every push / PR (both runtimes), plus a build smoke check.

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "22" # node --test glob-pattern args need >= 21

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test (bun)
        run: bun test src

      - name: Build (split, node-target)
        run: bun run build

      - name: Test (node:test on tsc output)
        run: npm run test:node

      - name: Demo render smoke
        shell: bash # `<` stdin redirect isn't supported by PowerShell (default on windows runners)
        run: node dist/index.js < sample-input.json
