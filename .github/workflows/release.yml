name: release

# Publishes to npm when a v* tag is pushed (e.g. `git push origin v0.1.0`).
# Requires repo secret NPM_TOKEN (an npm "Automation" access token).
# Provenance attestation needs id-token: write + a public repo.

on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for `npm publish --provenance`
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test src

      # `npm publish` runs the `prepack` script, which cleans + rebuilds dist via
      # `bun build` (bun is on PATH from setup-bun), so the published artifact is fresh.
      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
